{% extends "base.html" %}

{% block content %}
<div class="leaderboard-wrapper">
    <h2 class="leaderboard-title">Leaderboard</h2>

    <!-- Chart -->
    <div class="chart-container">
        <canvas id="leaderboardChart"></canvas>
    </div>

    <!-- Table -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Total Points</th>
                </tr>
            </thead>
            <tbody>
            {% for player, points in players %}
                <tr>
                    <td>{{ loop.index }}</td>
                    <td>{{ player }}</td>
                    <td>{{ points }}</td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>

</div>

<script src="{{ url_for('static', filename='js/chart.min.js') }}"></script>
<script>
const ctx = document.getElementById('leaderboardChart').getContext('2d');
const datasets = {{ datasets | tojson }};
const blockLabels = {{ block_labels | tojson }};

const chart = new Chart(ctx, {
    type: 'line',
    data: { labels: blockLabels, datasets: datasets },
    options: {
        responsive: true,
        plugins: { legend: { position: 'bottom' } },
        scales: { y: { beginAtZero: true, title: { display: true, text: 'Points' } },
                  x: { title: { display: true, text: 'Blocks' } } }
    }
});

</script>
{% endblock %}
