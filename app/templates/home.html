{% extends "base.html" %}

{% block content %}

<div class="center-box" style="width: 500px;">
    <h2>Welcome {{ user }}!</h2>

<p>
{% if points is not none %}
    You have <strong>{{ points }}</strong> points,
    <span id="taunt"></span>
{% else %}
    <span id="taunt"></span>
{% endif %}
</p>
    <hr>

    <p id="quote"></p>
</div>

  "Ctrl+C, Ctrl+V — but ethically!",
  "Think like a hacker, act like a guardian.",

  "Phishers gonna phish.",
  "Debugging is detective work.",
  "Security through obscurity is a myth.",
  "Every port tells a story.",
  "Firewalls are just paper tigers.",
  "The best hackers are the invisible ones.",
  "Backdoors are invitations.",
  "Passwords are the first line of defense.",
  "Encryption: because plaintext is dangerous.",

  "Penetrate, persist, protect.",
  "Hack smart, patch faster.",

  "careful, or you'll get pwnd!",

    const quote = quotes[Math.floor(Math.random() * quotes.length)];
    const taunt = taunts[Math.floor(Math.random() * taunts.length)];

    document.getElementById("quote").innerText = quote;
    document.getElementById("taunt").innerText = taunt;
}

window.onload = loadContent;

{% endblock %}
